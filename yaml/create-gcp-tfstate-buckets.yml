parameters:
  - name: project_id
    type: string

  - name: sigla
    type: string

  - name: bucket
    type: string

  - name: gcp_location
    type: string
    default: "us-central1"

steps:
  - script: |
      BUCKET="gs://${{ parameters.bucket }}"

      if gcloud storage buckets describe "${BUCKET}" > /dev/null 2>&1; then
        echo "##[warning]Bucket ${BUCKET} já existe — pulando criação."
      else
        gcloud storage buckets create "${BUCKET}" \
          --project="${{ parameters.project_id }}" \
          --location="${{ parameters.gcp_location }}" \
          --uniform-bucket-level-access
        gcloud storage buckets update "${BUCKET}" --versioning
      fi

      for PASTA in "terraform/${{ parameters.sigla }}" "terraform/iam"; do
        if gcloud storage ls "${BUCKET}/${PASTA}/" > /dev/null 2>&1; then
          echo "##[warning]Pasta ${PASTA} já existe — pulando."
        else
          echo "" | gcloud storage cp - "${BUCKET}/${PASTA}/.keep"
        fi
      done
    displayName: "🪣 Validar e criar bucket e subdiretórios"