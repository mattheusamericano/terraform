parameters:
  - name: project_id
    type: string

  - name: sigla
    type: string

  - name: bucket
    type: string

  - name: gcp_location
    type: string
    default: "us-central1"

steps:
  - script: |
      BUCKET="gs://${{ parameters.bucket }}"

      if gsutil ls -b "${BUCKET}" > /dev/null 2>&1; then
        echo "##[warning]Bucket ${BUCKET} já existe — pulando criação."
      else
        gsutil mb -p "${{ parameters.project_id }}" -l "${{ parameters.gcp_location }}" -b on "${BUCKET}"
        gsutil versioning set on "${BUCKET}"
      fi

      for PASTA in "terraform/${{ parameters.sigla }}" "terraform/iam"; do
        if gsutil ls "${BUCKET}/${PASTA}/" > /dev/null 2>&1; then
          echo "##[warning]Pasta ${PASTA} já existe — pulando."
        else
          echo "" | gsutil cp - "${BUCKET}/${PASTA}/.keep"
        fi
      done
    displayName: "🪣 Validar e criar bucket e subdiretórios"